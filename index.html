<!DOCTYPE html>
<html lang="pt br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnerCalc</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav id="menu">
            <div class="container-menu">
                <div class="logo">
                    <img src="img/logo.png" alt="EnerCalc">
                </div>
            </div>
            <ul>
                <li><button class="button-contact" id="button-contact">Contato</button></li>
            </ul>
        </nav>

        <section class="welcome">
            <div class="container-welcome">
                <div class="text">
                    <img src="img/welcome.png" alt="Bem-vindo">
                </div>
                <div class="img-male">
                    <img class="male" src="img/male.png" alt="Informação">
                </div>
            </div>
            <div class="text-info">
                <p>Aqui você encontra alguns cálculos simples de usar para estimar a potência, corrente, tensão, bitola,
                    disjuntor e consumo de energia elétrica.</p>
            </div>

            <div class="icon-onda"><img src="img/icon-onda.png"></div>
            <div class="icon-circulo"><img src="img/icon-circulo.png"></div>
            <div class="icon-play"><img src="img/icon-play.png"></div>
            <div class="icon-plus"><img src="img/icon-plus.png"></div>
        </section>
    </main>

</body>

</html>
